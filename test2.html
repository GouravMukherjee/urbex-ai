<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urbex California - Find Abandoned Places</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
    <style>
        :root {
            --color-bg-primary: #ffffff;
            --color-bg-secondary: #f8fafc;
            --color-accent: #0284c7;
            --color-accent-hover: #0369a1;
            --color-text-primary: #0f172a;
            --color-text-secondary: #64748b;
            --color-success: #16a34a;
            --color-warning: #ea580c;
            --color-danger: #dc2626;
            --color-border: #e2e8f0;
            --color-shadow: rgba(15, 23, 42, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background-color: var(--color-bg-primary);
            color: var(--color-text-primary);
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 360px;
            background-color: var(--color-bg-primary);
            border-right: 1px solid var(--color-border);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-header {
            padding: 32px 24px 24px;
        }

        .sidebar-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--color-text-primary);
            letter-spacing: -0.5px;
        }

        .sidebar-header p {
            font-size: 13px;
            color: var(--color-text-secondary);
        }

        .filters {
            padding: 24px 24px 16px;
            border-top: 1px solid var(--color-border);
            border-bottom: 1px solid var(--color-border);
        }

        .filter-group {
            margin-bottom: 18px;
        }

        .filter-group:last-child {
            margin-bottom: 0;
        }

        .filter-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--color-text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .filter-group input,
        .filter-group select {
            width: 100%;
            padding: 9px 11px;
            background-color: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            font-size: 13px;
            color: var(--color-text-primary);
            transition: all 0.15s ease;
        }

        .filter-group input:focus,
        .filter-group select:focus {
            outline: none;
            border-color: var(--color-accent);
            box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.1);
        }

        .search-actions {
            display: flex;
            gap: 8px;
            margin-top: 6px;
        }

        .search-button {
            flex: 1;
            padding: 9px 12px;
            border-radius: 8px;
            border: none;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.15s ease, box-shadow 0.15s ease, transform 0.05s ease;
        }

        .search-button.primary {
            background-color: var(--color-accent);
            color: #ffffff;
        }

        .search-button.primary:hover {
            background-color: var(--color-accent-hover);
            box-shadow: 0 2px 6px var(--color-shadow);
        }

        .search-button.secondary {
            background-color: #e2e8f0;
            color: #0f172a;
        }

        .search-button.secondary:hover {
            background-color: #cbd5e1;
        }

        .search-button:active {
            transform: translateY(1px);
            box-shadow: 0 1px 3px var(--color-shadow);
        }

        .stats-bar {
            padding: 12px 20px;
            background-color: var(--color-bg-secondary);
            font-size: 12px;
            color: var(--color-text-secondary);
            margin: 8px;
            border-radius: 8px;
        }

        .stats-bar strong {
            color: var(--color-accent);
        }

        .locations-list {
            flex: 1;
            overflow-y: auto;
        }

        .location-card {
            margin: 4px 8px;
            padding: 14px 18px;
            border-radius: 8px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .location-card:hover {
            background-color: var(--color-bg-secondary);
            border-color: var(--color-border);
            box-shadow: 0 2px 8px var(--color-shadow);
        }

        .location-card.active {
            background-color: rgba(2, 132, 199, 0.08);
            border-color: var(--color-accent);
        }

        .location-name {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .location-type {
            font-size: 11px;
            color: var(--color-text-secondary);
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.4px;
        }

        .location-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            font-size: 12px;
        }

        .rating {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stars {
            color: #f59e0b;
        }

        .rating-text {
            color: var(--color-text-secondary);
        }

        .difficulty {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
        }

        .difficulty.easy {
            background-color: rgba(22, 163, 74, 0.15);
            color: var(--color-success);
        }

        .difficulty.medium {
            background-color: rgba(234, 88, 12, 0.15);
            color: var(--color-warning);
        }

        .difficulty.hard {
            background-color: rgba(220, 38, 38, 0.15);
            color: var(--color-danger);
        }

        .location-coords {
            font-size: 11px;
            color: var(--color-text-secondary);
            font-family: 'Menlo', 'Monaco', monospace;
        }

        .location-distance {
            margin-top: 4px;
            font-size: 11px;
            color: var(--color-text-secondary);
        }

        .no-results {
            padding: 28px 18px;
            text-align: center;
            font-size: 13px;
            color: var(--color-text-secondary);
        }

        .map-container {
            flex: 1;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .leaflet-popup-content-wrapper {
            border-radius: 10px;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
            border: 1px solid var(--color-border);
        }

        .leaflet-popup-content {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 12px;
        }

        .location-popup h3 {
            margin: 0 0 6px;
            font-size: 14px;
        }

        .location-popup p {
            margin: 3px 0;
        }

        .location-popup .coords {
            margin-top: 6px;
            padding: 4px 6px;
            background-color: var(--color-bg-secondary);
            border-radius: 3px;
            font-family: 'Menlo', 'Monaco', monospace;
            font-size: 11px;
        }

        .location-popup .distance {
            margin-top: 4px;
            font-size: 11px;
            color: var(--color-accent);
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: 50%;
            }
            .map-container {
                height: 50%;
            }
        }

        .sidebar::-webkit-scrollbar,
        .locations-list::-webkit-scrollbar {
            width: 8px;
        }

        .sidebar::-webkit-scrollbar-thumb,
        .locations-list::-webkit-scrollbar-thumb {
            background: var(--color-border);
            border-radius: 4px;
        }

        .sidebar::-webkit-scrollbar-thumb:hover,
        .locations-list::-webkit-scrollbar-thumb:hover {
            background: var(--color-accent);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="sidebar">
        <div class="sidebar-header">
            <h1>🏚️ Urbex CA</h1>
            <p>Best-rated abandoned spots across California</p>
        </div>

        <div class="filters">
            <div class="filter-group">
                <label>Search by City</label>
                <input id="cityInput" type="text" placeholder="e.g., Los Angeles, San Jose">
            </div>

            <div class="filter-group">
                <label>Search by Name/Description</label>
                <input id="textInput" type="text" placeholder="e.g., zoo, mine, ranch">
            </div>

            <div class="filter-group">
                <label>Type</label>
                <select id="typeFilter">
                    <option value="">All types</option>
                    <option value="historical">Historical</option>
                    <option value="industrial">Industrial</option>
                    <option value="residential">Residential</option>
                    <option value="commercial">Commercial</option>
                    <option value="natural">Natural</option>
                    <option value="military">Military</option>
                </select>
            </div>

            <div class="filter-group">
                <label>Difficulty</label>
                <select id="difficultyFilter">
                    <option value="">All difficulties</option>
                    <option value="easy">Easy</option>
                    <option value="medium">Medium</option>
                    <option value="hard">Hard</option>
                </select>
            </div>

            <div class="search-actions">
                <button id="enterButton" class="search-button primary">Enter</button>
                <button id="viewAllButton" class="search-button secondary">View All</button>
            </div>
        </div>

        <div class="stats-bar">
            Showing <strong id="resultCount">0</strong> locations
        </div>

        <div id="locationsList" class="locations-list"></div>
    </div>

    <div class="map-container">
        <div id="map"></div>
    </div>
</div>

<script>
    // Preloaded California urbex locations (no upload required)
    const locations = [
        {
            name: "Old LA Zoo (Griffith Park)",
            type: "historical",
            lat: 34.1337,
            lng: -118.2888,
            rating: 4.6,
            reviews: 230,
            difficulty: "easy",
            description: "Abandoned zoo ruins with old enclosures and graffiti inside Griffith Park.",
            coords: "34.1337°N, 118.2888°W"
        },
        {
            name: "Murphy's Ranch (Rustic Canyon)",
            type: "historical",
            lat: 34.0720,
            lng: -118.5130,
            rating: 4.5,
            reviews: 190,
            difficulty: "medium",
            description: "1930s compound in Rustic Canyon with stairs, bunkers and concrete structures.",
            coords: "34.0720°N, 118.5130°W"
        },
        {
            name: "Sunken City (San Pedro)",
            type: "natural",
            lat: 33.7086,
            lng: -118.2932,
            rating: 4.7,
            reviews: 450,
            difficulty: "medium",
            description: "Neighborhood that slid into the ocean in the 1920s; broken slabs and heavy graffiti.",
            coords: "33.7086°N, 118.2932°W"
        },
        {
            name: "Big Horn Mine",
            type: "industrial",
            lat: 34.3390,
            lng: -117.7130,
            rating: 4.3,
            reviews: 150,
            difficulty: "hard",
            description: "Abandoned gold mine off Mount Baden-Powell with tunnels and mining structures.",
            coords: "34.3390°N, 117.7130°W"
        },
        {
            name: "Scary Dairy (Camarillo)",
            type: "industrial",
            lat: 34.2194,
            lng: -119.0361,
            rating: 4.2,
            reviews: 200,
            difficulty: "medium",
            description: "Graffitied dairy ruins near the old Camarillo State Hospital.",
            coords: "34.2194°N, 119.0361°W"
        },
        {
            name: "Bayside Cannery Ruins (San Jose)",
            type: "industrial",
            lat: 37.3382,
            lng: -121.8863,
            rating: 4.1,
            reviews: 110,
            difficulty: "easy",
            description: "Remnants of an old cannery operation in the South Bay.",
            coords: "37.3382°N, 121.8863°W"
        }
    ];

    const map = L.map('map').setView([36.7783, -119.4179], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors',
        maxZoom: 19
    }).addTo(map);

    let markers = {};
    let filteredLocations = [...locations];
    let cityCenter = null;

    function haversine(lat1, lon1, lat2, lon2) {
        const R = 3959;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 +
                  Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
                  Math.sin(dLon/2)**2;
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    async function geocodeCity(name) {
        const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(name + ", California")}&format=json&limit=1`;
        try {
            const res = await fetch(url, {
                headers: { "User-Agent": "UrbexCA/1.0 (student project)" }
            });
            const data = await res.json();
            if (!data || !data[0]) return null;
            return {
                lat: parseFloat(data[0].lat),
                lng: parseFloat(data[0].lon),
                label: data[0].display_name.split(',')[0]
            };
        } catch {
            return null;
        }
    }

    function createMarkers() {
        Object.values(markers).forEach(m => map.removeLayer(m));
        markers = {};

        filteredLocations.forEach(loc => {
            const color = {
                easy: '#16a34a',
                medium: '#ea580c',
                hard: '#dc2626'
            }[loc.difficulty] || '#0284c7';

            const icon = L.divIcon({
                className: 'custom-marker',
                html: `<div style="background:${color};width:30px;height:30px;border-radius:50%;border:3px solid #fff;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(15,23,42,0.3);">📍</div>`,
                iconSize: [30,30],
                popupAnchor: [0,-15]
            });

            const marker = L.marker([loc.lat, loc.lng], {icon}).addTo(map);

            const distanceBlock = cityCenter
                ? `<div class="distance">📍 ${haversine(cityCenter.lat, cityCenter.lng, loc.lat, loc.lng).toFixed(1)} miles away</div>`
                : '';

            marker.bindPopup(`
                <div class="location-popup">
                    <h3>${loc.name}</h3>
                    <p><strong>Type:</strong> ${loc.type}</p>
                    <p><strong>Rating:</strong> ⭐ ${loc.rating} (${loc.reviews} reviews)</p>
                    <p><strong>Difficulty:</strong> ${loc.difficulty}</p>
                    <p>${loc.description}</p>
                    <div class="coords">${loc.coords}</div>
                    ${distanceBlock}
                </div>
            `);

            markers[loc.name] = marker;
        });
    }

    function renderList() {
        const container = document.getElementById('locationsList');
        container.innerHTML = '';

        if (!filteredLocations.length) {
            container.innerHTML = '<div class="no-results">No locations found. Try a different city or clear filters.</div>';
            return;
        }

        filteredLocations.forEach(loc => {
            const card = document.createElement('div');
            card.className = 'location-card';

            const distanceLine = cityCenter
                ? `<div class="location-distance">📍 ${haversine(cityCenter.lat, cityCenter.lng, loc.lat, loc.lng).toFixed(1)} mi away</div>`
                : '';

            card.innerHTML = `
                <div class="location-name">${loc.name}</div>
                <div class="location-type">${loc.type}</div>
                <div class="location-meta">
                    <div class="rating">
                        <span class="stars">⭐ ${loc.rating}</span>
                        <span class="rating-text">(${loc.reviews})</span>
                    </div>
                    <span class="difficulty ${loc.difficulty}">${loc.difficulty}</span>
                </div>
                <div class="location-coords">${loc.coords}</div>
                ${distanceLine}
            `;

            card.addEventListener('click', () => {
                map.setView([loc.lat, loc.lng], 13);
                markers[loc.name].openPopup();
                document.querySelectorAll('.location-card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');
            });

            container.appendChild(card);
        });

        document.getElementById('resultCount').textContent = filteredLocations.length;
    }

    async function applyFilters() {
        const cityText = document.getElementById('cityInput').value.trim();
        const text = document.getElementById('textInput').value.trim().toLowerCase();
        const typeVal = document.getElementById('typeFilter').value;
        const diffVal = document.getElementById('difficultyFilter').value;

        let base = [...locations];
        cityCenter = null;

        if (cityText) {
            const geo = await geocodeCity(cityText);
            if (geo) {
                cityCenter = geo;
                const RADIUS = 80; // miles
                base = base.filter(l => haversine(geo.lat, geo.lng, l.lat, l.lng) <= RADIUS)
                           .sort((a,b) =>
                               haversine(geo.lat, geo.lng, a.lat, a.lng) -
                               haversine(geo.lat, geo.lng, b.lat, b.lng)
                           );
                map.setView([geo.lat, geo.lng], 8);
            }
        } else {
            map.setView([36.7783, -119.4179], 6);
        }

        filteredLocations = base.filter(l => {
            const matchesText = !text ||
                l.name.toLowerCase().includes(text) ||
                l.description.toLowerCase().includes(text);
            const matchesType = !typeVal || l.type === typeVal;
            const matchesDiff = !diffVal || l.difficulty === diffVal;
            return matchesText && matchesType && matchesDiff;
        });

        createMarkers();
        renderList();
    }

    function resetView() {
        document.getElementById('cityInput').value = '';
        document.getElementById('textInput').value = '';
        document.getElementById('typeFilter').value = '';
        document.getElementById('difficultyFilter').value = '';
        cityCenter = null;
        filteredLocations = [...locations];
        map.setView([36.7783, -119.4179], 6);
        createMarkers();
        renderList();
    }

    document.getElementById('enterButton').addEventListener('click', applyFilters);
    document.getElementById('viewAllButton').addEventListener('click', resetView);

    document.getElementById('cityInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') applyFilters();
    });
    document.getElementById('textInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') applyFilters();
    });

    // initial render
    createMarkers();
    renderList();
</script>
</body>
</html>
